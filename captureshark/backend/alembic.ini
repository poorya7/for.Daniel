# Alembic configuration for CaptureShark.
#
# The database URL is *not* set here — `migrations/env.py` reads the
# project `Settings` and derives a sync-driver URL from it, so a single
# source of truth (`.env` → `Settings`) drives both runtime and
# migration connections. Pinning the URL in this file would invite
# drift between environments.

[alembic]
# `%(here)s` resolves to the directory containing this `alembic.ini`,
# so `alembic` works the same whether invoked from `backend/` or from
# a parent directory via `-c backend/alembic.ini`.
script_location = %(here)s/migrations
prepend_sys_path = %(here)s/src
path_separator = os
version_path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Disabled — leave the URL to env.py.
sqlalchemy.url =

[post_write_hooks]
# We run `ruff format` ourselves; no Alembic post-hook needed.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
