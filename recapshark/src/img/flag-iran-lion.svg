<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <rect width="120" height="27" fill="#239f40"/>
  <rect y="27" width="120" height="26" fill="#fff"/>
  <rect y="53" width="120" height="27" fill="#da0000"/>
  <!-- Lion and Sun simplified emblem -->
  <g transform="translate(60,40)" fill="#f4a500" stroke="#b87800" stroke-width="0.5">
    <!-- Sun circle -->
    <circle cx="0" cy="-2" r="6" fill="#f4a500" stroke="none"/>
    <!-- Sun rays -->
    <g stroke="#f4a500" stroke-width="1.5" fill="none">
      <line x1="0" y1="-9" x2="0" y2="-12"/>
      <line x1="5.5" y1="-7" x2="8" y2="-10"/>
      <line x1="8" y1="-2" x2="11" y2="-2"/>
      <line x1="5.5" y1="3" x2="8" y2="6"/>
      <line x1="0" y1="5" x2="0" y2="8"/>
      <line x1="-5.5" y1="3" x2="-8" y2="6"/>
      <line x1="-8" y1="-2" x2="-11" y2="-2"/>
      <line x1="-5.5" y1="-7" x2="-8" y2="-10"/>
    </g>
    <!-- Lion body simplified -->
    <ellipse cx="-2" cy="1" rx="8" ry="5" fill="#f4a500" stroke="#b87800" stroke-width="0.6"/>
    <!-- Lion head -->
    <circle cx="6" cy="-3" r="4" fill="#f4a500" stroke="#b87800" stroke-width="0.6"/>
    <!-- Sword -->
    <line x1="-10" y1="6" x2="10" y2="-8" stroke="#b87800" stroke-width="1.2"/>
  </g>
</svg>
